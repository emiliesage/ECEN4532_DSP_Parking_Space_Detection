<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Parking Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg:       #0a0c0f;
    --panel:    #111418;
    --border:   #1e2530;
    --text:     #c8d0dc;
    --dim:      #4a5568;
    --green:    #00e87a;
    --red:      #ff3d5a;
    --amber:    #ffb830;
    --lap-col:  #a78bfa;
    --std-col:  #38bdf8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    letter-spacing: 0.04em;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header .logo span { color: var(--green); }
  .conn-pill {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.72rem; letter-spacing: 0.05em; color: var(--dim);
    background: var(--bg); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 20px;
  }
  .conn-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--dim);
    transition: background 0.4s;
  }
  .conn-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }

  /* ── Layout ── */
  main {
    display: grid;
    grid-template-columns: 1fr 300px;
    grid-template-rows: auto 1fr;
    gap: 0;
    flex: 1;
    overflow: hidden;
  }

  /* ── Stats bar ── */
  .stats-bar {
    grid-column: 1 / -1;
    display: flex;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-cell {
    flex: 1;
    background: var(--panel);
    padding: 14px 20px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .stat-cell .label {
    font-size: 0.62rem; letter-spacing: 0.1em; color: var(--dim); text-transform: uppercase;
  }
  .stat-cell .value {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem; font-weight: 800; line-height: 1;
    transition: color 0.3s;
  }
  .stat-cell.lap .label { color: var(--lap-col); }
  .stat-cell.std .label { color: var(--std-col); }
  .stat-cell.lap .value { color: var(--lap-col); }
  .stat-cell.std .value { color: var(--std-col); }

  /* ── Map canvas area ── */
  .map-section {
    position: relative;
    background: var(--bg);
    overflow: hidden;
    border-right: 1px solid var(--border);
  }
  .map-section canvas {
    display: block;
    width: 100%; height: 100%;
    object-fit: contain;
  }
  .method-toggle {
    position: absolute; top: 14px; left: 14px;
    display: flex; gap: 6px;
  }
  .method-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em;
    padding: 5px 12px; border-radius: 4px; cursor: pointer;
    border: 1px solid;
    background: transparent;
    transition: background 0.2s, color 0.2s;
  }
  .method-btn.lap  { border-color: var(--lap-col); color: var(--lap-col); }
  .method-btn.std  { border-color: var(--std-col); color: var(--std-col); }
  .method-btn.both { border-color: var(--amber);   color: var(--amber);   }
  .method-btn.active { color: #0a0c0f; }
  .method-btn.lap.active  { background: var(--lap-col); }
  .method-btn.std.active  { background: var(--std-col); }
  .method-btn.both.active { background: var(--amber); }

  /* ── Sidebar ── */
  .sidebar {
    display: flex; flex-direction: column;
    background: var(--panel);
    overflow-y: auto;
  }
  .sidebar-header {
    padding: 14px 18px;
    font-size: 0.65rem; letter-spacing: 0.12em; color: var(--dim);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--panel); z-index: 1;
  }
  .space-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px;
    border-bottom: 1px solid #191e26;
    transition: background 0.2s;
  }
  .space-row:hover { background: #161b23; }
  .space-id   { font-size: 0.7rem; color: var(--dim); min-width: 28px; }
  .space-name { flex: 1; font-size: 0.78rem; }
  .badge {
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em;
    padding: 2px 7px; border-radius: 3px;
    min-width: 40px; text-align: center;
  }
  .badge.free { background: rgba(0,232,122,0.15); color: var(--green); border: 1px solid rgba(0,232,122,0.3); }
  .badge.occ  { background: rgba(255,61,90,0.15);  color: var(--red);   border: 1px solid rgba(255,61,90,0.3); }
  .badge-pair { display: flex; gap: 4px; }

  /* ── Legend ── */
  .legend {
    padding: 16px 18px;
    border-top: 1px solid var(--border);
    margin-top: auto;
    font-size: 0.65rem; color: var(--dim);
  }
  .legend-row { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }

  /* ── No-signal overlay ── */
  #no-signal {
    position: fixed; inset: 0;
    background: rgba(10,12,15,0.88);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px;
    z-index: 100;
    transition: opacity 0.5s;
  }
  #no-signal.hidden { opacity: 0; pointer-events: none; }
  #no-signal .ns-icon  { font-size: 3rem; }
  #no-signal .ns-title { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: #fff; }
  #no-signal .ns-sub   { font-size: 0.75rem; color: var(--dim); }

  /* ── Mismatch indicator ── */
  .mismatch-badge {
    position: absolute; bottom: 14px; left: 14px;
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.07em;
    padding: 4px 10px; border-radius: 4px;
    background: rgba(255,184,48,0.15); color: var(--amber);
    border: 1px solid rgba(255,184,48,0.35);
    display: none;
  }
  .mismatch-badge.visible { display: block; }
</style>
</head>
<body>

<div id="no-signal">
  <div class="ns-icon">📡</div>
  <div class="ns-title">Waiting for data</div>
  <div class="ns-sub">Start parking_server.py and connect the ESP32</div>
</div>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect x="2" y="2" width="18" height="18" rx="3" stroke="#00e87a" stroke-width="1.5"/>
      <path d="M6 16V8h4a3 3 0 010 6H6" stroke="#00e87a" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    PARK<span>SENSE</span>
  </div>
  <div class="conn-pill">
    <div class="conn-dot" id="connDot"></div>
    <span id="connLabel">CONNECTING…</span>
  </div>
</header>

<main>
  <div class="stats-bar">
    <div class="stat-cell">
      <div class="label">Total Spaces</div>
      <div class="value" id="statTotal">—</div>
    </div>
    <div class="stat-cell lap">
      <div class="label">Free · Laplacian</div>
      <div class="value" id="statFreeLap">—</div>
    </div>
    <div class="stat-cell std">
      <div class="label">Free · Std Dev</div>
      <div class="value" id="statFreeStd">—</div>
    </div>
    <div class="stat-cell">
      <div class="label">Frame</div>
      <div class="value" id="statFrame">—</div>
    </div>
    <div class="stat-cell">
      <div class="label">Last Update</div>
      <div class="value" style="font-size:1rem;padding-top:4px" id="statTime">—</div>
    </div>
  </div>

  <section class="map-section" id="mapSection">
    <canvas id="mapCanvas"></canvas>
    <div class="method-toggle">
      <button class="method-btn lap active" data-m="lap"  onclick="setMode('lap')">LAPLACIAN</button>
      <button class="method-btn std"        data-m="std"  onclick="setMode('std')">STD DEV</button>
      <button class="method-btn both"       data-m="both" onclick="setMode('both')">BOTH</button>
    </div>
    <div class="mismatch-badge" id="mismatchBadge">⚠ METHODS DISAGREE</div>
  </section>

  <aside class="sidebar">
    <div class="sidebar-header">Spaces — per method</div>
    <div id="spaceList"></div>
    <div class="legend">
      <div>COLOUR KEY</div>
      <div class="legend-row">
        <div class="legend-item"><div class="legend-swatch" style="background:var(--green)"></div>FREE</div>
        <div class="legend-item"><div class="legend-swatch" style="background:var(--red)"></div>OCCUPIED</div>
        <div class="legend-item"><div class="legend-swatch" style="background:var(--amber)"></div>DISAGREE</div>
      </div>
      <div style="margin-top:10px">
        <span style="color:var(--lap-col)">■</span> Laplacian &nbsp;
        <span style="color:var(--std-col)">■</span> Std Dev
      </div>
    </div>
  </aside>
</main>

<script>
const STATUS_URL  = `http://parkingCuFinal.gleeze.com:8080/status`;
const POLL_MS     = 5000;   // poll every 5 s (camera sends every 60 s)

let displayMode = 'lap';
let latestData  = null;
let consecutiveFails = 0;

// ── Polling ─────────────────────────────────────────────────────────────────
async function poll() {
  try {
    const res = await fetch(STATUS_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(res.status);
    const d = await res.json();
    consecutiveFails = 0;
    setConn(true);
    if (d && d.spaces) {
      latestData = d;
      update(d);
      document.getElementById('no-signal').classList.add('hidden');
    }
  } catch {
    consecutiveFails++;
    if (consecutiveFails >= 3) setConn(false);
  }
  setTimeout(poll, POLL_MS);
}

function setConn(live) {
  document.getElementById('connDot').className     = 'conn-dot' + (live ? ' live' : '');
  document.getElementById('connLabel').textContent = live ? 'LIVE' : 'DISCONNECTED';
}

// ── Mode toggle ──────────────────────────────────────────────────────────────
function setMode(m) {
  displayMode = m;
  document.querySelectorAll('.method-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.m === m));
  if (latestData) drawMap(latestData);
}

// ── Stats + sidebar update ───────────────────────────────────────────────────
function update(d) {
  document.getElementById('statTotal').textContent   = d.total;
  document.getElementById('statFreeLap').textContent = d.free_lap;
  document.getElementById('statFreeStd').textContent = d.free_std;
  document.getElementById('statFrame').textContent   = d.frame;
  const t = new Date(d.timestamp * 1000);
  document.getElementById('statTime').textContent    = t.toTimeString().slice(0, 8);

  const disagree = d.spaces.some(s => s.free_lap !== s.free_std);
  document.getElementById('mismatchBadge').classList.toggle('visible', disagree);

  const list = document.getElementById('spaceList');
  list.innerHTML = '';
  d.spaces.forEach(s => {
    const row = document.createElement('div');
    row.className = 'space-row';
    row.innerHTML = `
      <div class="space-id">#${s.id}</div>
      <div class="space-name">Space ${s.id}</div>
      <div class="badge-pair">
        <div class="badge ${s.free_lap ? 'free' : 'occ'}" title="Laplacian">${s.free_lap ? 'FREE' : 'OCC'}</div>
        <div class="badge ${s.free_std ? 'free' : 'occ'}" title="Std Dev">${s.free_std ? 'FREE' : 'OCC'}</div>
      </div>`;
    list.appendChild(row);
  });

  drawMap(d);
}

// ── Canvas map ───────────────────────────────────────────────────────────────
function drawMap(d) {
  const section = document.getElementById('mapSection');
  const canvas  = document.getElementById('mapCanvas');
  const W = section.clientWidth  || 640;
  const H = section.clientHeight || 480;
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0d1017';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#161d28';
  ctx.lineWidth = 1;
  const g = 40;
  for (let x = 0; x < W; x += g) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += g) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  if (!d || !d.spaces.length) return;

  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  d.spaces.forEach(s => s.polygon.forEach(([x,y]) => {
    if (x < minX) minX=x; if (y < minY) minY=y;
    if (x > maxX) maxX=x; if (y > maxY) maxY=y;
  }));
  const polyW = maxX - minX || 640;
  const polyH = maxY - minY || 480;
  const pad   = 48;
  const scale = Math.min((W - pad*2) / polyW, (H - pad*2) / polyH);
  const offX  = (W - polyW * scale) / 2 - minX * scale;
  const offY  = (H - polyH * scale) / 2 - minY * scale;
  const tx = x => x * scale + offX;
  const ty = y => y * scale + offY;

  d.spaces.forEach(s => {
    const pts = s.polygon;
    if (!pts || pts.length < 2) return;

    let fillCol, strokeCol;
    if (displayMode === 'lap') {
      fillCol   = s.free_lap ? 'rgba(0,232,122,0.18)' : 'rgba(255,61,90,0.18)';
      strokeCol = s.free_lap ? '#00e87a' : '#ff3d5a';
    } else if (displayMode === 'std') {
      fillCol   = s.free_std ? 'rgba(0,232,122,0.18)' : 'rgba(255,61,90,0.18)';
      strokeCol = s.free_std ? '#00e87a' : '#ff3d5a';
    } else {
      const agree = s.free_lap === s.free_std;
      fillCol   = agree ? (s.free_lap ? 'rgba(0,232,122,0.15)' : 'rgba(255,61,90,0.15)') : 'rgba(255,184,48,0.18)';
      strokeCol = agree ? (s.free_lap ? '#00e87a' : '#ff3d5a') : '#ffb830';
    }

    ctx.beginPath();
    ctx.moveTo(tx(pts[0][0]), ty(pts[0][1]));
    pts.slice(1).forEach(([x,y]) => ctx.lineTo(tx(x), ty(y)));
    ctx.closePath();
    ctx.fillStyle = fillCol;
    ctx.fill();
    ctx.strokeStyle = strokeCol;
    ctx.lineWidth   = 2.5;
    ctx.stroke();

    const cx = pts.reduce((a,[x]) => a+x, 0) / pts.length;
    const cy = pts.reduce((a,[,y]) => a+y, 0) / pts.length;
    ctx.fillStyle    = '#fff';
    ctx.font         = `bold ${Math.max(11, 13*scale)|0}px JetBrains Mono, monospace`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`#${s.id}`, tx(cx), ty(cy));

    if (displayMode === 'both') {
      const bx = tx(cx), by = ty(cy) + 14;
      ctx.font = '9px JetBrains Mono, monospace';
      ctx.fillStyle = s.free_lap ? '#00e87a' : '#ff3d5a';
      ctx.fillText('L', bx - 8, by);
      ctx.fillStyle = s.free_std ? '#00e87a' : '#ff3d5a';
      ctx.fillText('S', bx + 8, by);
    }
  });
}

window.addEventListener('resize', () => { if (latestData) drawMap(latestData); });

poll();
</script>
</body>
</html>
